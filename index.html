<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEXA PROTECTOR 🔐</title>
    <style>
        :root { --main-color: #bc13fe; --bg-dark: #0a0a0a; --panel-bg: #1a1a1a; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        h1 { color: var(--main-color); font-size: 28px; text-shadow: 0 0 10px var(--main-color); margin-top: 30px; }
        p.sub { color: #888; font-size: 12px; margin-top: -10px; margin-bottom: 25px; }

        textarea { 
            width: 90%; height: 180px; background: var(--panel-bg); border: 2px solid #333; 
            border-radius: 12px; color: #eee; padding: 12px; font-size: 14px; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--main-color); box-shadow: 0 0 8px var(--main-color); }

        .btn-gen { 
            width: 95%; padding: 15px; background: var(--main-color); color: #fff; 
            border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; text-transform: uppercase;
        }

        .output-container { 
            display: none; width: 95%; margin-top: 25px; padding: 15px; background: var(--panel-bg); 
            border-radius: 12px; border: 1px solid #333; text-align: left;
        }

        .status { color: #00ff88; font-weight: bold; margin-bottom: 10px; display: block; }
        .result-link { color: var(--main-color); font-size: 11px; word-break: break-all; display: block; margin-bottom: 15px; }
        
        .code-box { 
            background: #000; padding: 12px; border-radius: 8px; border-left: 4px solid var(--main-color);
            font-family: monospace; font-size: 12px; color: #ccc; word-break: break-all;
        }

        .btn-copy { 
            width: 100%; padding: 12px; background: #fff; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>JEXA PROTECTOR 🔐</h1>
    <p class="sub">Advanced Lua Obfuscation & Loading</p>

    <textarea id="scriptInput" placeholder="-- Pega tu script de Roblox aquí..."></textarea>
    
    <button class="btn-gen" onclick="generate()">Proteger Script</button>

    <div id="output" class="output-container">
        <span class="status">✔ JEXA Loadstring Generado!</span>
        <span id="rawUrl" class="result-link"></span>
        
        <div style="color: #888; font-size: 12px; margin-bottom: 5px;">Copiable Loadstring:</div>
        <div class="code-box" id="loadstringResult"></div>
        
        <button class="btn-copy" onclick="copyText()">COPIAR RESULTADO</button>
    </div>

    <script>
        async function generate() {
            const code = document.getElementById('scriptInput').value;
            if(!code) return alert("Error: No has pegado ningún código.");

            const response = await fetch('/api/save', {
                method: 'POST',
                body: JSON.stringify({ script: code }),
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            const fullUrl = window.location.origin + '/api/raw?id=' + data.id;
            document.getElementById('rawUrl').innerText = fullUrl;
            document.getElementById('loadstringResult').innerText = `loadstring(game:HttpGet("${fullUrl}"))()`;
            document.getElementById('output').style.display = 'block';
        }

        function copyText() {
            const text = document.getElementById('loadstringResult').innerText;
            navigator.clipboard.writeText(text);
            alert("¡Copiado al portapapeles!");
        }
    </script>
</body>
</html>
