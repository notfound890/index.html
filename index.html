<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #030303; color: #fff; overflow: hidden; height: 100vh; }

        /* --- EFECTO DE LÍNEAS DE MONITOR --- */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* --- ENTRADA --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .welcome-text { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 15px; text-shadow: 0 0 30px #a855f7; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .enter-btn { margin-top: 40px; background: transparent; border: 1px solid #a855f7; color: #fff; padding: 15px 50px; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 5px; transition: 0.5s; }
        .enter-btn:hover { background: #a855f7; box-shadow: 0 0 40px #a855f7; }

        /* --- FONDO LLUVIA --- */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.7; }

        /* --- NAVEGACIÓN (Nombres Originales) --- */
        .top-nav { display: flex; justify-content: center; background: rgba(0,0,0,0.85); border-bottom: 1px solid #a855f7; backdrop-filter: blur(10px); z-index: 10; position: sticky; top: 0; }
        .nav-btn { background: transparent; border: none; color: #666; padding: 20px 25px; font-weight: bold; cursor: pointer; transition: 0.4s; font-size: 0.85rem; letter-spacing: 2px; }
        .nav-btn.active { color: #a855f7; border-bottom: 3px solid #a855f7; text-shadow: 0 0 10px #a855f7; }

        /* --- CONTENEDOR --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; height: calc(100vh - 70px); overflow-y: auto; scrollbar-width: none; }
        .container::-webkit-scrollbar { display: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        /* --- TARJETAS --- */
        .card { background: rgba(15, 15, 20, 0.6); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 8px; padding: 25px; transition: 0.3s; position: relative; }
        .card:hover { border-color: #a855f7; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card h3 { font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 10px; }
        .card p { color: #888; font-size: 0.85rem; margin-bottom: 20px; }

        .btn { 
            width: 100%; background: #a855f7; color: white; border: none; padding: 12px; 
            border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s;
        }
        .btn:hover { background: #6d28d9; letter-spacing: 2px; }

        /* --- MÚSICA (SoundCloud) --- */
        .music-box { background: #000; border: 1px solid #a855f7; border-radius: 12px; padding: 30px; max-width: 600px; margin: 0 auto; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; background: #0a0a0a; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 6px; outline: none; }
        .search-bar input:focus { border-color: #a855f7; }
        #sc-player { width: 100%; height: 300px; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 class="welcome-text">JEXA HUB</h2>
        <button class="enter-btn" onclick="entrar()">ENTRAR</button>
    </div>

    <div class="top-nav">
        <button class="nav-btn active" onclick="tab('main', this)">SCRIPTS</button>
        <button class="nav-btn" onclick="tab('others', this)">OTHERS SCRIPTS</button>
        <button class="nav-btn" onclick="tab('music', this)">MÚSICA</button>
    </div>

    <canvas id="rainCanvas"></canvas>

    <div class="container">
        
        <div id="main" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h3>Jexa Ping Pong</h3>
                    <p>te ayuda para que puedas hacer ping pong en los admins abuse</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">COPIAR SCRIPT</button>
                </div>
                <div class="card">
                    <h3>Jexa Duels</h3>
                    <p>Script para pc y Android, muy completo y facil de usar.</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">COPIAR SCRIPT</button>
                </div>
            </div>
        </div>

        <div id="others" class="tab-content">
            <div class="grid" id="othersGrid"></div>
        </div>

        <div id="music" class="tab-content">
            <div class="music-box">
                <h3 style="margin-bottom: 15px; font-family: 'Orbitron'; font-size: 0.9rem;">REPRODUCTOR CLOUD</h3>
                <div class="search-bar">
                    <input type="text" id="mInput" placeholder="Artista o canción..." onkeypress="if(event.key==='Enter') buscarSC()">
                    <button class="btn" style="width: auto; padding: 0 20px;" onclick="buscarSC()">BUSCAR</button>
                </div>
                <div id="sc-player">
                    <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/1251347317&color=%23a855f7&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true"></iframe>
                </div>
            </div>
        </div>

    </div>

    <script>
        const otherScripts = [
            {n: "XLSQR X SAKURA DUELS", c: "loadstring(Game:HttpGet('https://iyfvpnjrghsownkpazec.supabase.co/functions/v1/get-paste?slug=X69tj7lY'))()"},
            {n: "MG", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/f24b98a7a26bd68bd26fc311c558cd1f.lua'))()"},
            {n: "LURK HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/fd920d2c87a95ee573d6fde239b63d15.lua'))()"},
            {n: "000 DUELS AUTO PLAY", c: "Loadstring(game:HttpGet('https://pastebin.com/raw/E05dV3da', true))()"},
            {n: "AEZY AUTO DUEL", c: "loadstring(game:HttpGet('https://pastebin.com/raw/cK4pSfKJ'))()"},
            {n: "LEX HUB", c: "loadstring(game:HttpGet('https://pastefy.app/TgrXAo7z/raw'))()"},
            {n: "FROST HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/af5e78ca32e06034a3ea30c5bf1a76c9.lua'))()"},
            {n: "Light Duel", c: "loadstring(game:HttpGet('https://api.rubis.app/v2/scrap/dIS6cF3WKwYIHATO/raw?accessKey=C2UdA3ZMGuTlBklFfoLTGfF9FFAClVB6',true))()"},
            {n: "Kawatan duels", c: "loadstring(game:HttpGet('https://monlua-protector.vercel.app/raw/3511f1916f88970b320f6473ae8a907c'))()"},
            {n: "nine hub", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/e285247e216c4ae3a89d5663b87212bd.lua'))()"},
            {n: "EGO DUELS", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/8273322905877bb11fbc66b9de390b7e.lua'))()"},
            {n: "Sosa duels", c: "loadstring(game:HttpGet('https://api.jnkie.com/api/v1/luascripts/public/36f9254fca8bb9ea84cccee053bbc2b29260cb72a099832ff357f6b56b03c454/download'))()"},
            {n: "bks hub btw", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/a7b5616e0dba9debf9d1d30cc2ceee9f.lua'))()"}
        ];

        const grid = document.getElementById('othersGrid');
        otherScripts.forEach(s => {
            grid.innerHTML += `<div class="card"><h3>${s.n}</h3><p>Script externo listo.</p><button class="btn" onclick="copiar('${s.c}')">COPIAR SCRIPT</button></div>`;
        });

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function entrar() {
            document.getElementById('overlay').style.transform = "scale(1.5)";
            document.getElementById('overlay').style.opacity = "0";
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 1000);
        }

        function copiar(t) { 
            navigator.clipboard.writeText(t); 
            let o = event.target.innerText;
            event.target.innerText = '¡LISTO!'; 
            setTimeout(() => event.target.innerText = o, 1500); 
        }

        // --- BUSCADOR SOUNDCLOUD ---
        function buscarSC() {
            const q = document.getElementById('mInput').value;
            if(!q) return;
            // El buscador de SoundCloud a través del widget funciona redirigiendo a su página de búsqueda integrada
            const player = document.getElementById('sc-player');
            player.innerHTML = `<iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/search%3Fq%3D${encodeURIComponent(q)}&color=%23a855f7&auto_play=true&visual=true"></iframe>`;
        }

        // --- LLUVIA ---
        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function resize() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let drops = Array(150).fill().map(() => ({x:Math.random()*rain.width, y:Math.random()*rain.height, l:Math.random()*30, s:Math.random()*15+5}));
        function animate() {
            ctx.clearRect(0,0,rain.width,rain.height); ctx.strokeStyle = 'rgba(168, 85, 247, 0.5)'; ctx.lineWidth = 1.5;
            drops.forEach(d => { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke(); d.y += d.s; if(d.y > rain.height) d.y = -d.l; });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
