<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #030303; color: #fff; overflow: hidden; height: 100vh; }

        /* --- SCANLINES EFFECT --- */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* --- ENTRADA ELITE --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0f051a 0%, #000 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .welcome-text { 
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; letter-spacing: 15px; 
            text-shadow: 0 0 30px #a855f7; animation: pulseGlow 2s infinite; 
        }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }
        
        .enter-btn { 
            margin-top: 50px; background: transparent; border: 1px solid #a855f7; color: #fff; 
            padding: 15px 50px; border-radius: 2px; cursor: pointer; font-family: 'Orbitron';
            letter-spacing: 5px; transition: 0.5s; box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.2);
        }
        .enter-btn:hover { background: #a855f7; box-shadow: 0 0 50px #a855f7; transform: translateY(-5px); }

        /* --- FONDO LLUVIA --- */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6; }

        /* --- NAVEGACIÓN --- */
        .top-nav { 
            display: flex; justify-content: center; background: rgba(0,0,0,0.8); 
            border-bottom: 1px solid rgba(168, 85, 247, 0.4); backdrop-filter: blur(15px);
            z-index: 10; position: sticky; top: 0;
        }
        .nav-btn { 
            background: transparent; border: none; color: #555; padding: 20px 30px; 
            font-weight: bold; cursor: pointer; transition: 0.4s; font-size: 0.9rem; letter-spacing: 2px;
        }
        .nav-btn.active { color: #a855f7; border-bottom: 3px solid #a855f7; text-shadow: 0 0 15px #a855f7; }

        /* --- CONTENEDOR --- */
        .container { 
            max-width: 1100px; margin: 0 auto; padding: 40px 20px; 
            height: calc(100vh - 80px); overflow-y: auto; scrollbar-width: none;
        }
        .container::-webkit-scrollbar { display: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

        /* --- TARJETAS DE SCRIPT --- */
        .card { 
            background: rgba(15, 15, 20, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 4px; padding: 25px; backdrop-filter: blur(10px); position: relative;
            overflow: hidden; transition: 0.4s;
        }
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: #a855f7; opacity: 0; transition: 0.3s;
        }
        .card:hover { border-color: #a855f7; background: rgba(168, 85, 247, 0.05); transform: scale(1.02); }
        .card:hover::before { opacity: 1; }

        .card h3 { font-family: 'Orbitron'; font-size: 1rem; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
        .card p { color: #777; font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px; }

        .btn { 
            width: 100%; background: linear-gradient(45deg, #a855f7, #6d28d9); 
            color: white; border: none; padding: 12px; border-radius: 2px; 
            cursor: pointer; font-weight: bold; font-family: 'Orbitron'; font-size: 0.8rem;
            transition: 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }
        .btn:hover { filter: brightness(1.3); letter-spacing: 3px; box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }

        /* --- MÚSICA DECK --- */
        .music-deck {
            background: #000; border: 2px solid #333; border-radius: 8px; padding: 30px;
            max-width: 700px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .search-box input {
            width: 100%; background: #0a0a0a; border: 1px solid #a855f7; padding: 15px;
            color: #fff; font-family: 'Orbitron'; border-radius: 4px; outline: none; margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.2);
        }
        .player-wrapper {
            width: 100%; height: 250px; background: #050505; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 1px dashed #444; position: relative;
        }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }

        #yt-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 class="welcome-text">JEXA SYSTEM</h2>
        <button class="enter-btn" onclick="entrarAlHub()">INITIALIZE</button>
    </div>

    <div class="top-nav">
        <button class="nav-btn active" onclick="tab('main', this)">DATABASE</button>
        <button class="nav-btn" onclick="tab('others', this)">OTHERS</button>
        <button class="nav-btn" onclick="tab('music', this)">AUDIO STREAM</button>
    </div>

    <canvas id="rainCanvas"></canvas>
    <div id="yt-player"></div>

    <div class="container">
        
        <div id="main" class="tab-content active">
            <h2 style="font-family: 'Orbitron'; margin-bottom: 30px; font-size: 1rem; color: #a855f7;">// MAIN_MODULES</h2>
            <div class="grid">
                <div class="card">
                    <h3>Jexa Ping Pong</h3>
                    <p>te ayuda para que puedas hacer ping pong en los admins abuse</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">GET SCRIPT</button>
                </div>
                <div class="card">
                    <h3>Jexa Duels</h3>
                    <p>Script para pc y Android, muy completo y facil de usar.</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">GET SCRIPT</button>
                </div>
            </div>
        </div>

        <div id="others" class="tab-content">
            <h2 style="font-family: 'Orbitron'; margin-bottom: 30px; font-size: 1rem; color: #a855f7;">// EXTERNAL_SCRIPTS</h2>
            <div class="grid" id="othersGrid"></div>
        </div>

        <div id="music" class="tab-content">
            <div class="music-deck">
                <h3 style="font-family: 'Orbitron'; margin-bottom: 15px;">SEARCH AUDIO</h3>
                <input type="text" id="mInput" placeholder="ENTER SONG NAME..." onkeypress="if(event.key==='Enter') buscarYT()">
                <div class="player-wrapper" id="music-player-container">
                    <p style="color:#333; font-family: 'Orbitron'; font-size: 0.7rem;">NO SIGNAL</p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const otherScripts = [
            {n: "XLSQR X SAKURA DUELS", c: "loadstring(Game:HttpGet('https://iyfvpnjrghsownkpazec.supabase.co/functions/v1/get-paste?slug=X69tj7lY'))()"},
            {n: "MG", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/f24b98a7a26bd68bd26fc311c558cd1f.lua'))()"},
            {n: "LURK HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/fd920d2c87a95ee573d6fde239b63d15.lua'))()"},
            {n: "000 DUELS AUTO PLAY", c: "Loadstring(game:HttpGet('https://pastebin.com/raw/E05dV3da', true))()"},
            {n: "AEZY AUTO DUEL", c: "loadstring(game:HttpGet('https://pastebin.com/raw/cK4pSfKJ'))()"},
            {n: "LEX HUB", c: "loadstring(game:HttpGet('https://pastefy.app/TgrXAo7z/raw'))()"},
            {n: "FROST HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/af5e78ca32e06034a3ea30c5bf1a76c9.lua'))()"},
            {n: "Light Duel", c: "loadstring(game:HttpGet('https://api.rubis.app/v2/scrap/dIS6cF3WKwYIHATO/raw?accessKey=C2UdA3ZMGuTlBklFfoLTGfF9FFAClVB6',true))()"},
            {n: "Kawatan duels", c: "loadstring(game:HttpGet('https://monlua-protector.vercel.app/raw/3511f1916f88970b320f6473ae8a907c'))()"},
            {n: "nine hub", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/e285247e216c4ae3a89d5663b87212bd.lua'))()"},
            {n: "EGO DUELS", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/8273322905877bb11fbc66b9de390b7e.lua'))()"},
            {n: "Sosa duels", c: "loadstring(game:HttpGet('https://api.jnkie.com/api/v1/luascripts/public/36f9254fca8bb9ea84cccee053bbc2b29260cb72a099832ff357f6b56b03c454/download'))()"},
            {n: "bks hub btw", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/a7b5616e0dba9debf9d1d30cc2ceee9f.lua'))()"}
        ];

        const grid = document.getElementById('othersGrid');
        otherScripts.forEach(s => {
            grid.innerHTML += `<div class="card"><h3>${s.n}</h3><p>External logic ready.</p><button class="btn" onclick="copiar('${s.c}')">EXECUTE_COPY</button></div>`;
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', { videoId: 'CKI8iQTgZKU', playerVars: { autoplay:1, loop:1, playlist:'CKI8iQTgZKU' }, events: { onReady: (e) => e.target.setVolume(20) } });
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function entrarAlHub() { 
            const ov = document.getElementById('overlay');
            ov.style.transform = "translateY(-100%)";
            setTimeout(() => ov.style.display = 'none', 1200);
            if(player) player.playVideo(); 
        }

        function copiar(t) { 
            navigator.clipboard.writeText(t); 
            let old = event.target.innerText;
            event.target.innerText = 'SUCCESS_COPIED'; 
            setTimeout(() => event.target.innerText = old, 1500); 
        }

        function buscarYT() {
            const q = document.getElementById('mInput').value;
            const container = document.getElementById('music-player-container');
            if(!q) return;
            // Modo "Music Only" - Ocultamos parte del video con el diseño del deck
            container.innerHTML = `<iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(q)}&autoplay=1" allow="autoplay"></iframe>`;
            if(player) player.pauseVideo();
        }

        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function resize() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let drops = Array(180).fill().map(() => ({x:Math.random()*rain.width, y:Math.random()*rain.height, l:Math.random()*25+10, s:Math.random()*15+8}));
        function animate() {
            ctx.clearRect(0,0,rain.width,rain.height); ctx.strokeStyle = 'rgba(168, 85, 247, 0.4)'; ctx.lineWidth = 1.5;
            drops.forEach(d => { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke(); d.y += d.s; if(d.y > rain.height) d.y = -d.l; });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
