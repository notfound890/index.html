<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #050505; color: #fff; overflow: hidden; height: 100vh; }

        /* --- Pantalla de Inicio (Vibrante) --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #110820 0%, #050505 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efecto de líneas de escaneo */
        #overlay::before {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .welcome-text {
            font-size: 1.5rem; color: #fff; letter-spacing: 15px; margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

        .enter-btn {
            background: transparent; border: 1px solid #a855f7; color: #fff;
            padding: 12px 35px; font-size: 1rem; font-weight: 700; border-radius: 4px;
            cursor: pointer; transition: 0.3s; letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .enter-btn:hover { background: #a855f7; box-shadow: 0 0 30px rgba(168, 85, 247, 0.5); }

        /* --- Interfaz Principal --- */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        
        .header { text-align: center; padding: 40px 20px 20px; }
        .title { 
            font-size: 2.8rem; font-weight: 700; 
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.3));
        }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; overflow-y: auto; height: calc(100vh - 120px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        .card { 
            background: rgba(15, 15, 22, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 15px; padding: 25px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: #a855f7; }
        .card h3 { font-size: 1.3rem; margin-bottom: 8px; color: #fff; }
        .card p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }

        .btn { 
            display: block; width: 100%; background: #a855f7; 
            color: #fff; padding: 12px; border: none; border-radius: 8px; 
            font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .btn:hover { background: #9333ea; }

        #yt-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 class="welcome-text">JEXA HUB</h2>
        <button class="enter-btn" onclick="entrarAlHub()">ENTER</button>
    </div>

    <div id="yt-player"></div>
    <canvas id="rainCanvas"></canvas>

    <div class="header"><h1 class="title">JEXA HUB</h1></div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Jexa Ping Pong</h3>
                <p>te ayuda para que puedas hacer ping pong en los admins abuse</p>
                <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">COPIAR SCRIPT</button>
            </div>
            
            <div class="card">
                <h3>Jexa Duels</h3>
                <p>Script para pc y Android, muy completo y facil de usar para que tengas tus victorias aseguradas.</p>
                <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">COPIAR SCRIPT</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'CKI8iQTgZKU',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'CKI8iQTgZKU' },
                events: { 'onReady': (e) => e.target.setVolume(35) }
            });
        }

        function entrarAlHub() {
            const over = document.getElementById('overlay');
            over.style.opacity = '0';
            setTimeout(() => over.style.display = 'none', 1000);
            if (player) player.playVideo();
        }

        function copiar(t) { 
            navigator.clipboard.writeText(t); 
            let originalText = event.target.innerText;
            event.target.innerText = '¡COPIADO!'; 
            setTimeout(() => event.target.innerText = originalText, 2000); 
        }

        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function resize() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let drops = Array(80).fill().map(() => ({x: Math.random()*rain.width, y: Math.random()*rain.height, l: Math.random()*15+5, s: Math.random()*7+7}));
        function animate() {
            ctx.clearRect(0,0,rain.width,rain.height); ctx.strokeStyle = 'rgba(168,85,247,0.15)'; ctx.lineWidth = 1;
            drops.forEach(d => { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke(); d.y += d.s; if(d.y > rain.height) { d.y = -d.l; d.x = Math.random()*rain.width; }});
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
