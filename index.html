<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jexa Official Hub</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 800px; margin-top: 50px; }
        .card { 
            background: #1a1a1a; border: 1px solid #333; padding: 20px; 
            border-radius: 15px; margin-bottom: 20px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(160, 32, 240, 0.1);
        }
        .card:hover { transform: translateY(-5px); border-color: #a020f0; box-shadow: 0 0 20px rgba(160, 32, 240, 0.4); }
        h1 { color: #a020f0; text-shadow: 0 0 10px #a020f0; }
        button { 
            background: #a020f0; color: white; border: none; padding: 10px 20px; 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>JEXA HUB 🚀</h1>
    <div class="container">
        <div class="card">
            <h3>Jexa Protector 🔒</h3>
            <p>Protege tus scripts de Roblox con un ID único.</p>
            <button onclick="window.location.href='/protector'">Ir al Protector</button>
        </div>
        
        <div class="card">
            <h3>Winder Hub ⚡</h3>
            <p>El mejor script para simulator y survival games.</p>
            <button onclick="navigator.clipboard.writeText('loadstring(game:HttpGet(\'TU_LINK_AQUI\'))()')">Copiar Loadstring</button>
        </div>
    </div>
</body>
</html>
