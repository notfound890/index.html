<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #050505; color: #fff; overflow: hidden; height: 100vh; }

        /* --- NUEVO EFECTO DE ENTRADA (Terminal Scan) --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #overlay h2 { font-size: 1.8rem; color: #a855f7; letter-spacing: 20px; text-shadow: 0 0 20px rgba(168, 85, 247, 0.8); }

        #overlay::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            opacity: 0.3; pointer-events: none;
        }

        .loader { width: 100%; height: 2px; background: rgba(168,85,247,0.1); margin-top: 20px; position: relative; overflow: hidden; max-width: 300px; }
        .loader::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: #a855f7; animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        /* --- FONDO LLUVIA NEÓN --- */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; }
        .glow-bg { position: fixed; top: -10%; left: 50%; transform: translateX(-50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, transparent 70%); z-index: -2; }

        /* --- INTERFAZ PRINCIPAL (Más pequeña y compacta) --- */
        .header { text-align: center; padding: 40px 20px 20px; }
        .title { 
            font-size: 2.8rem; font-weight: 700; 
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.3));
        }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; overflow-y: auto; height: calc(100vh - 120px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }

        .card { 
            background: rgba(15, 15, 22, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 15px; padding: 25px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .card h3 { font-size: 1.3rem; margin-bottom: 8px; color: #fff; }
        .card p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }

        .btn { display: block; width: 100%; background: #a855f7; color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.9rem; text-transform: uppercase; }
        .btn:hover { background: #9333ea; }

        /* --- NUEVO REPRODUCTOR DE MÚSICA (Compacto) --- */
        .music-card {
            background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(168, 85, 247, 0.2); 
            border-radius: 15px; padding: 20px; margin-top: 20px;
        }
        .search-row { display: flex; gap: 10px; margin-bottom: 15px; }
        #searchInput { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #fff; font-size: 0.9rem; }
        #searchInput:focus { border-color: #a855f7; outline: none; }
        
        /* Iframe para SoundCloud */
        #music-player-frame { width: 100%; height: 166px; border: none; border-radius: 10px; }
        
        #yt-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>JEXA HUB</h2>
        <div class="loader"></div>
        <p style="color: rgba(255,255,255,0.3); font-size: 0.7rem; margin-top: 10px; cursor: pointer;" onclick="entrarAlHub()">Click para forzar entrada</p>
    </div>

    <div id="yt-player"></div>
    <canvas id="rainCanvas"></canvas>

    <div class="header"><h1 class="title">JEXA HUB</h1></div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Jexa Ping Pong</h3>
                <p>te ayuda para que puedas hacer ping pong en los admins abuse</p>
                <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">COPIAR SCRIPT</button>
            </div>
            
            <div class="card">
                <h3>Jexa Duels</h3>
                <p>Script para pc y Android, muy completo y facil de usar para que tengas tus victorias aseguradas.</p>
                <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">COPIAR SCRIPT</button>
            </div>
        </div>

        <div class="music-card">
            <h3 style="font-size: 1.1rem; margin-bottom: 15px; color: rgba(255,255,255,0.5);">🎵 BÚSQUEDA DE MÚSICA</h3>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Busca canción o artista...">
                <button class="btn" style="width: auto; padding: 10px 20px;" onclick="buscarMusica()">BUSCAR</button>
            </div>
            <iframe id="music-player-frame" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/123&color=%23a855f7&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'CKI8iQTgZKU', // Sigue sonando Arctic Monkeys
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'CKI8iQTgZKU' },
                events: { 'onReady': (e) => e.target.setVolume(35) }
            });
        }

        // --- SISTEMA DE BÚSQUEDA DE MÚSICA (Conexión directa) ---
        function buscarMusica() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            // Esta es la conexión directa al buscador de SoundCloud.
            // SoundCloud no permite búsquedas directas sin API Key en iframe,
            // pero podemos redirigir el iframe a su página de búsqueda oficial.
            // El reproductor volverá a cargar un track por defecto.
            const searchUrl = `https://soundcloud.com/search/sounds?q=${encodeURIComponent(query)}`;
            
            // Para reproducir una canción específica, necesitamos la URL de SoundCloud.
            // Si el usuario pega una URL de SoundCloud en el buscador, ¡la reproducimos!
            if (query.startsWith('https://soundcloud.com/')) {
                document.getElementById('music-player-frame').src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(query)}&color=%23a855f7&auto_play=true`;
            } else {
                // Si solo buscan texto, les mostramos la búsqueda en una pestaña nueva
                // porque el reproductor no soporta búsqueda directa por texto.
                window.open(searchUrl, '_blank');
                alert('He abierto la búsqueda en SoundCloud en otra pestaña. Pega el link de la canción aquí para reproducirla en el Hub.');
            }
        }

        function entrarAlHub() {
            const over = document.getElementById('overlay');
            over.style.opacity = '0';
            setTimeout(() => over.style.display = 'none', 1000);
            if (player) player.playVideo();
        }

        function copiar(t) { 
            navigator.clipboard.writeText(t); 
            let originalText = event.target.innerText;
            event.target.innerText = '¡COPIADO!'; 
            setTimeout(() => event.target.innerText = originalText, 2000); 
        }

        // --- LLUVIA NEÓN ---
        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function resize() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let drops = Array(80).fill().map(() => ({x: Math.random()*rain.width, y: Math.random()*rain.height, l: Math.random()*15+5, s: Math.random()*7+7}));
        function animate() {
            ctx.clearRect(0,0,rain.width,rain.height); ctx.strokeStyle = 'rgba(168,85,247,0.15)'; ctx.lineWidth = 1;
            drops.forEach(d => { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke(); d.y += d.s; if(d.y > rain.height) { d.y = -d.l; d.x = Math.random()*rain.width; }});
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
