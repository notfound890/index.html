<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #030303; color: #fff; overflow: hidden; height: 100vh; }

        /* EFECTO SCANLINES */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* ENTRADA - FIX CRÍTICO */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; visibility: visible; opacity: 1; transition: 0.8s ease;
        }
        .welcome-text { font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 10px; text-shadow: 0 0 30px #a855f7; text-align: center; margin: 20px; }
        .enter-btn { background: transparent; border: 2px solid #a855f7; color: #fff; padding: 15px 45px; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 5px; transition: 0.3s; font-weight: bold; }
        .enter-btn:hover { background: #a855f7; box-shadow: 0 0 40px #a855f7; }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6; }

        /* NAVEGACIÓN */
        .top-nav { display: flex; justify-content: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #a855f7; z-index: 10; position: sticky; top: 0; }
        .nav-btn { background: transparent; border: none; color: #777; padding: 18px 15px; font-weight: bold; cursor: pointer; transition: 0.4s; font-size: 0.75rem; letter-spacing: 1px; }
        .nav-btn.active { color: #a855f7; border-bottom: 3px solid #a855f7; text-shadow: 0 0 10px #a855f7; }

        .container { max-width: 900px; margin: 0 auto; padding: 25px 15px; height: calc(100vh - 65px); overflow-y: auto; scrollbar-width: none; }
        .container::-webkit-scrollbar { display: none; }

        .tab-content { display: none; opacity: 0; transition: 0.3s; }
        .tab-content.active { display: block; opacity: 1; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }

        .card { background: rgba(15, 15, 20, 0.8); border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 10px; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: #a855f7; transform: scale(1.02); }
        .card h3 { font-family: 'Orbitron'; font-size: 0.95rem; margin-bottom: 8px; color: #fff; }
        
        .btn { 
            width: 100%; background: #a855f7; color: white; border: none; padding: 12px; 
            border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s;
        }
        .btn:hover { filter: brightness(1.2); letter-spacing: 1px; }

        /* MÚSICA & DISCORD */
        .music-box { background: rgba(10,10,15,0.95); border: 1px solid #a855f7; border-radius: 12px; padding: 20px; max-width: 550px; margin: 0 auto; }
        .discord-btn { display: block; background: #5865F2; color: #fff; text-decoration: none; text-align: center; padding: 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(88,101,242,0.3); }
        
        .search-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-bar input { flex: 1; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 6px; outline: none; font-size: 0.9rem; }
        
        .results-list { display: flex; flex-direction: column; gap: 8px; max-height: 180px; overflow-y: auto; }
        .track-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .track-item:hover { border-color: #a855f7; background: rgba(168,85,247,0.1); }
        .track-item img { width: 40px; height: 40px; border-radius: 4px; }
        .track-info h4 { font-size: 0.8rem; }
        .track-info p { font-size: 0.6rem; color: #888; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 class="welcome-text">JEXA HUB</h2>
        <button class="enter-btn" onclick="entrarYa()">ENTRAR</button>
    </div>

    <div class="top-nav">
        <button id="navMain" class="nav-btn active" onclick="tab('main', this)">SCRIPTS</button>
        <button class="nav-btn" onclick="tab('others', this)">OTHERS SCRIPTS</button>
        <button class="nav-btn" onclick="tab('music', this)">MÚSICA</button>
    </div>

    <canvas id="rainCanvas"></canvas>

    <div class="container">
        <div id="main" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h3>Jexa Ping Pong</h3>
                    <p style="color:#aaa; font-size:0.75rem; margin-bottom:15px;">te ayuda para que puedas hacer ping pong en los admins abuse</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">COPIAR SCRIPT</button>
                </div>
                <div class="card">
                    <h3>Jexa Duels</h3>
                    <p style="color:#aaa; font-size:0.75rem; margin-bottom:15px;">Script para pc y Android, muy completo.</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">COPIAR SCRIPT</button>
                </div>
            </div>
        </div>

        <div id="others" class="tab-content">
            <div class="grid" id="othersGrid"></div>
        </div>

        <div id="music" class="tab-content">
            <div class="music-box">
                <a href="https://discord.gg/Ykm9kVuBe" target="_blank" class="discord-btn">ÚNETE AL DISCORD</a>
                <div class="search-bar">
                    <input type="text" id="mInput" placeholder="Nombre de canción..." onkeypress="if(event.key==='Enter') buscarMusica()">
                    <button class="btn" style="width:auto; padding:0 15px;" onclick="buscarMusica()">BUSCAR</button>
                </div>
                <div id="results" class="results-list"></div>
                <div id="player-container" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Scripts masivos
        const otherScripts = [
            {n: "XLSQR X SAKURA DUELS", c: "loadstring(Game:HttpGet('https://iyfvpnjrghsownkpazec.supabase.co/functions/v1/get-paste?slug=X69tj7lY'))()"},
            {n: "MG", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/f24b98a7a26bd68bd26fc311c558cd1f.lua'))()"},
            {n: "LURK HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/fd920d2c87a95ee573d6fde239b63d15.lua'))()"},
            {n: "000 DUELS AUTO PLAY", c: "Loadstring(game:HttpGet('https://pastebin.com/raw/E05dV3da', true))()"},
            {n: "AEZY AUTO DUEL", c: "loadstring(game:HttpGet('https://pastebin.com/raw/cK4pSfKJ'))()"},
            {n: "LEX HUB", c: "loadstring(game:HttpGet('https://pastefy.app/TgrXAo7z/raw'))()"},
            {n: "FROST HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/af5e78ca32e06034a3ea30c5bf1a76c9.lua'))()"},
            {n: "Light Duel", c: "loadstring(game:HttpGet('https://api.rubis.app/v2/scrap/dIS6cF3WKwYIHATO/raw?accessKey=C2UdA3ZMGuTlBklFfoLTGfF9FFAClVB6',true))()"},
            {n: "Kawatan duels", c: "loadstring(game:HttpGet('https://monlua-protector.vercel.app/raw/3511f1916f88970b320f6473ae8a907c'))()"},
            {n: "nine hub", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/e285247e216c4ae3a89d5663b87212bd.lua'))()"},
            {n: "EGO DUELS", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/8273322905877bb11fbc66b9de390b7e.lua'))()"},
            {n: "Sosa duels", c: "loadstring(game:HttpGet('https://api.jnkie.com/api/v1/luascripts/public/36f9254fca8bb9ea84cccee053bbc2b29260cb72a099832ff357f6b56b03c454/download'))()"},
            {n: "bks hub btw", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/a7b5616e0dba9debf9d1d30cc2ceee9f.lua'))()"}
        ];

        const grid = document.getElementById('othersGrid');
        otherScripts.forEach(s => {
            grid.innerHTML += `<div class="card"><h3>${s.n}</h3><button class="btn" onclick="copiar('${s.c}')">COPIAR SCRIPT</button></div>`;
        });

        // FUNCIONES DE CONTROL
        function entrarYa() {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 800);
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function copiar(t) { 
            const el = document.createElement('textarea');
            el.value = t; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            let o = event.target.innerText; event.target.innerText = '¡LISTO!'; 
            setTimeout(() => event.target.innerText = o, 1200); 
        }

        async function buscarMusica() {
            const q = document.getElementById('mInput').value;
            if(!q) return;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '<p style="text-align:center; font-size:0.7rem;">Buscando...</p>';
            try {
                const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&limit=5&entity=song`);
                const d = await r.json();
                resDiv.innerHTML = '';
                d.results.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'track-item';
                    div.innerHTML = `<img src="${t.artworkUrl60}"><div class="track-info"><h4>${t.trackName}</h4><p>${t.artistName}</p></div>`;
                    div.onclick = () => {
                        document.getElementById('player-container').innerHTML = `<audio controls autoplay style="width:100%;"><source src="${t.previewUrl}" type="audio/mpeg"></audio>`;
                    };
                    resDiv.appendChild(div);
                });
            } catch(e) { resDiv.innerHTML = '<p>Sin conexión.</p>'; }
        }

        // LLUVIA
        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function res() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.onresize = res; res();
        let drops = Array(120).fill().map(() => ({x:Math.random()*rain.width, y:Math.random()*rain.height, l:Math.random()*20, s:Math.random()*10+5}));
        function anim() {
            ctx.clearRect(0,0,rain.width,rain.height); ctx.strokeStyle = 'rgba(168, 85, 247, 0.4)'; ctx.lineWidth = 1.5;
            drops.forEach(d => { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke(); d.y += d.s; if(d.y > rain.height) d.y = -d.l; });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
