<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { 
            background-color: #050505; 
            color: #fff; 
            overflow-x: hidden;
            height: 100vh;
        }

        /* --- PANTALLA DE INICIO CON MÁS VIDA --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s ease-in-out;
        }

        .welcome-text {
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        .enter-btn {
            background: transparent;
            border: 2px solid #a855f7;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: #a855f7;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.7);
            transform: scale(1.05);
        }

        /* --- FONDO Y DISEÑO --- */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
        
        .header { text-align: center; padding: 50px 20px 30px; }
        .title { 
            font-size: 3.2rem; /* Más pequeño como pediste */
            font-weight: 700; 
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.4));
            letter-spacing: -2px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card { 
            background: rgba(15, 15, 22, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; padding: 30px; /* Más pequeño */
            backdrop-filter: blur(20px); 
            transition: 0.4s ease; 
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: #a855f7; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .card h3 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
        .card p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.6; }

        .btn { 
            display: block; width: 100%; 
            background: #a855f7; 
            color: #fff; padding: 14px; border: none; border-radius: 10px; 
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn:hover { background: #9333ea; transform: scale(1.02); }

        #yt-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 class="welcome-text">JEXA HUB</h2>
        <button class="enter-btn" onclick="entrarAlHub()">ENTRAR</button>
    </div>

    <div id="yt-player"></div>

    <canvas id="rainCanvas"></canvas>

    <div class="header"><h1 class="title">JEXA HUB</h1></div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Jexa Ping Pong</h3>
                <p>te ayuda para que puedas hacer ping pong en los admins abuse</p>
                <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">COPIAR SCRIPT</button>
            </div>
            
            <div class="card">
                <h3>Jexa Duels</h3>
                <p>Script para pc y Android, muy completo y facil de usar para que tengas tus victorias aseguradas.</p>
                <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">COPIAR SCRIPT</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'CKI8iQTgZKU',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'CKI8iQTgZKU' },
                events: { 'onReady': (e) => e.target.setVolume(35) }
            });
        }

        function entrarAlHub() {
            const over = document.getElementById('overlay');
            over.style.opacity = '0';
            setTimeout(() => over.style.display = 'none', 1000);
            if (player) player.playVideo();
        }

        function copiar(t) { 
            navigator.clipboard.writeText(t); 
            event.target.innerText = '¡COPIADO!'; 
            setTimeout(() => event.target.innerText = 'COPIAR SCRIPT', 2000); 
        }

        // --- LLUVIA ---
        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function resize() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let drops = Array(100).fill().map(() => ({
            x: Math.random() * rain.width,
            y: Math.random() * rain.height,
            l: Math.random() * 20 + 10,
            s: Math.random() * 8 + 10
        }));

        function animate() {
            ctx.clearRect(0,0,rain.width,rain.height);
            ctx.strokeStyle = 'rgba(168,85,247,0.2)';
            ctx.lineWidth = 1;
            drops.forEach(d => {
                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();
                d.y += d.s;
                if(d.y > rain.height) { d.y = -d.l; d.x = Math.random()*rain.width; }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
