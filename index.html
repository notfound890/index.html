<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #020202; color: #fff; overflow: hidden; height: 100vh; }

        /* --- ENTRADA --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 1s ease-in-out;
        }
        .welcome-text { font-size: 1.5rem; letter-spacing: 12px; text-shadow: 0 0 20px #a855f7; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .enter-btn { background: transparent; border: 2px solid #a855f7; color: #fff; padding: 15px 40px; border-radius: 8px; cursor: pointer; margin-top: 30px; font-weight: bold; transition: 0.3s; }
        .enter-btn:hover { background: #a855f7; box-shadow: 0 0 30px #a855f7; }

        /* --- FONDO --- */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; }
        
        /* --- NAVEGACIÓN --- */
        .top-nav { display: flex; justify-content: center; background: rgba(10,10,15,0.9); border-bottom: 1px solid #a855f7; z-index: 10; position: sticky; top: 0; }
        .nav-btn { background: transparent; border: none; color: #666; padding: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .nav-btn.active { color: #a855f7; border-bottom: 2px solid #a855f7; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; height: calc(100vh - 80px); overflow-y: auto; scrollbar-width: none; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: rgba(20, 20, 25, 0.7); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px); }
        .card h3 { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .card p { color: #888; font-size: 0.8rem; margin-bottom: 15px; }
        .btn { width: 100%; background: #a855f7; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* --- MÚSICA --- */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; background: #111; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        #music-player-container { width: 100%; border-radius: 12px; overflow: hidden; background: #111; min-height: 200px; display: flex; align-items: center; justify-content: center; }

        #yt-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 class="welcome-text">JEXA HUB</h2>
        <button class="enter-btn" onclick="entrarAlHub()">ENTRAR</button>
    </div>

    <div class="top-nav">
        <button class="nav-btn active" onclick="tab('main', this)">MAIN</button>
        <button class="nav-btn" onclick="tab('others', this)">OTHERS SCRIPTS</button>
        <button class="nav-btn" onclick="tab('music', this)">MUSIC FULL</button>
    </div>

    <canvas id="rainCanvas"></canvas>
    <div id="yt-player"></div>

    <div class="container">
        
        <div id="main" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h3>Jexa Ping Pong</h3>
                    <p>te ayuda para que puedas hacer ping pong en los admins abuse</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/b2529dca38c794579ded1ac8068c3aa1/raw\'))()')">COPY</button>
                </div>
                <div class="card">
                    <h3>Jexa Duels</h3>
                    <p>Script para pc y Android, muy completo y facil de usar.</p>
                    <button class="btn" onclick="copiar('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/jesuanx7/ca0c614e004e839d3b92504798065895/raw\'))()')">COPY</button>
                </div>
            </div>
        </div>

        <div id="others" class="tab-content">
            <div class="grid" id="othersGrid">
                </div>
        </div>

        <div id="music" class="tab-content">
            <div class="card">
                <h3>Buscador YouTube Full</h3>
                <p>Escribe el nombre de la canción y presiona Enter para que suene completa.</p>
                <div class="search-box">
                    <input type="text" id="mInput" placeholder="Ej: Eladio Carrion 3 Am..." onkeypress="if(event.key==='Enter') buscarYT()">
                </div>
                <div id="music-player-container">
                    <p id="musicStatus" style="color:#555">Esperando búsqueda...</p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const otherScripts = [
            {n: "XLSQR X SAKURA DUELS", c: "loadstring(Game:HttpGet('https://iyfvpnjrghsownkpazec.supabase.co/functions/v1/get-paste?slug=X69tj7lY'))()"},
            {n: "MG", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/f24b98a7a26bd68bd26fc311c558cd1f.lua'))()"},
            {n: "LURK HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/fd920d2c87a95ee573d6fde239b63d15.lua'))()"},
            {n: "000 DUELS AUTO PLAY", c: "Loadstring(game:HttpGet('https://pastebin.com/raw/E05dV3da', true))()"},
            {n: "AEZY AUTO DUEL", c: "loadstring(game:HttpGet('https://pastebin.com/raw/cK4pSfKJ'))()"},
            {n: "LEX HUB", c: "loadstring(game:HttpGet('https://pastefy.app/TgrXAo7z/raw'))()"},
            {n: "FROST HUB DUELS", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/af5e78ca32e06034a3ea30c5bf1a76c9.lua'))()"},
            {n: "Light Duel", c: "loadstring(game:HttpGet('https://api.rubis.app/v2/scrap/dIS6cF3WKwYIHATO/raw?accessKey=C2UdA3ZMGuTlBklFfoLTGfF9FFAClVB6',true))()"},
            {n: "Kawatan duels", c: "loadstring(game:HttpGet('https://monlua-protector.vercel.app/raw/3511f1916f88970b320f6473ae8a907c'))()"},
            {n: "nine hub", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/e285247e216c4ae3a89d5663b87212bd.lua'))()"},
            {n: "EGO DUELS", c: "Loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/8273322905877bb11fbc66b9de390b7e.lua'))()"},
            {n: "Sosa duels", c: "loadstring(game:HttpGet('https://api.jnkie.com/api/v1/luascripts/public/36f9254fca8bb9ea84cccee053bbc2b29260cb72a099832ff357f6b56b03c454/download'))()"},
            {n: "bks hub btw", c: "loadstring(game:HttpGet('https://api.luarmor.net/files/v4/loaders/a7b5616e0dba9debf9d1d30cc2ceee9f.lua'))()"}
        ];

        // Cargar scripts automáticamente
        const grid = document.getElementById('othersGrid');
        otherScripts.forEach(s => {
            grid.innerHTML += `<div class="card"><h3>${s.n}</h3><p>Script externo optimizado.</p><button class="btn" onclick="copiar('${s.c}')">COPY</button></div>`;
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', { videoId: 'CKI8iQTgZKU', playerVars: { autoplay:1, loop:1, playlist:'CKI8iQTgZKU' }, events: { onReady: (e) => e.target.setVolume(20) } });
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function entrarAlHub() { 
            document.getElementById('overlay').style.display = 'none'; 
            if(player) player.playVideo(); 
        }

        function copiar(t) { 
            navigator.clipboard.writeText(t); 
            event.target.innerText = 'COPIED!'; 
            setTimeout(() => event.target.innerText = 'COPY', 2000); 
        }

        function buscarYT() {
            const q = document.getElementById('mInput').value;
            const container = document.getElementById('music-player-container');
            if(!q) return;
            // Usamos un embed de búsqueda de YouTube para que el usuario elija y suene completa
            container.innerHTML = `<iframe width="100%" height="300" src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(q)}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            if(player) player.pauseVideo(); // Pausa la música de fondo
        }

        // --- LLUVIA ---
        const rain = document.getElementById('rainCanvas');
        const ctx = rain.getContext('2d');
        function resize() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let drops = Array(150).fill().map(() => ({x:Math.random()*rain.width, y:Math.random()*rain.height, l:Math.random()*30+15, s:Math.random()*12+10}));
        function animate() {
            ctx.clearRect(0,0,rain.width,rain.height); ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
            drops.forEach(d => { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke(); d.y += d.s; if(d.y > rain.height) d.y = -d.l; });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
