<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexa Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        
        body { background-color: #030303; color: #fff; overflow: hidden; height: 100vh; }

        /* EFECTO SCANLINES */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* ENTRADA */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 1.2s ease-in-out;
        }
        .welcome-text { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 15px; text-shadow: 0 0 30px #a855f7; }
        .enter-btn { margin-top: 40px; background: transparent; border: 1px solid #a855f7; color: #fff; padding: 15px 50px; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 5px; transition: 0.5s; }
        .enter-btn:hover { background: #a855f7; box-shadow: 0 0 40px #a855f7; }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.7; }

        /* NAVEGACIÓN */
        .top-nav { display: flex; justify-content: center; background: rgba(0,0,0,0.85); border-bottom: 1px solid #a855f7; backdrop-filter: blur(10px); z-index: 10; position: sticky; top: 0; }
        .nav-btn { background: transparent; border: none; color: #666; padding: 20px 25px; font-weight: bold; cursor: pointer; transition: 0.4s; font-size: 0.85rem; letter-spacing: 2px; }
        .nav-btn.active { color: #a855f7; border-bottom: 3px solid #a855f7; text-shadow: 0 0 10px #a855f7; }

        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; height: calc(100vh - 70px); overflow-y: auto; scrollbar-width: none; }
        .container::-webkit-scrollbar { display: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .card { background: rgba(15, 15, 20, 0.6); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 8px; padding: 25px; transition: 0.3s; }
        .card:hover { border-color: #a855f7; transform: translateY(-5px); }
        .card h3 { font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 10px; }
        
        .btn { 
            width: 100%; background: #a855f7; color: white; border: none; padding: 12px; 
            border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s;
        }
        .btn:hover { background: #6d28d9; letter-spacing: 2px; }

        /* SECCIÓN MÚSICA ARREGLADA */
        .music-box { background: rgba(10,10,15,0.95); border: 1px solid #a855f7; border-radius: 12px; padding: 25px; max-width: 600px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .discord-btn { display: block; background: #5865F2; color: #fff; text-decoration: none; text-align: center; padding: 10px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 20px; transition: 0.3s; }
        .discord-btn:hover { background: #4752c4; box-shadow: 0 0 15px #5865F2; }

        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-bar input { flex: 1; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 6px; outline: none; }
        
        .results-list { display: flex; flex-direction: column; gap: 8px; max-height: 180px; overflow-y: auto; margin-bottom: 15px; }
        .track-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .track-item:hover { border-color: #a855f7; background: rgba(168,85,247,0.1); }
        .track-item img { width: 45px; height: 45px; border-radius: 4px; }
        .track-info h4 { font-size: 0.8rem; color: #fff; }
        .track-info p { font-size: 0.65rem; color: #777; }

        #player-container { width: 100%; border-radius: 8px; overflow: hidden; background: #000; min-height: 80px; }
    </style>
</head>
<body>

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
